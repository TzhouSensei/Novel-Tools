<!doctype html>
<html lang="vi">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title data-i18n="library.page_title">Thư viện Sách ePub Cục Bộ</title>

        <link href="../../libs/i18n/language.css" rel="stylesheet" />
        <style>
            :root {
                --primary: #4a90e2;
                --bg: #f5f7fa;
                --card-bg: #ffffff;
            }
            body {
                font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
                background-color: var(--var-bg, #f5f7fa);
                margin: 0;
                padding: 20px;
            }
            .container {
                max-width: 1000px;
                margin: 0 auto;
            }
            header {
                display: flex;
                justify-content: space-between;
                align-items: center;
                margin-bottom: 30px;
            }
            h1 {
                color: #333;
                margin: 0;
            }
            .upload-btn-wrapper {
                position: relative;
                overflow: hidden;
                display: inline-block;
            }
            .btn-upload {
                border: 2px dashed var(--primary);
                color: var(--primary);
                background-color: white;
                padding: 10px 20px;
                border-radius: 8px;
                font-weight: bold;
                cursor: pointer;
            }
            .upload-btn-wrapper input[type="file"] {
                font-size: 100px;
                position: absolute;
                left: 0;
                top: 0;
                opacity: 0;
                cursor: pointer;
            }
            .grid-library {
                display: grid;
                grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
                gap: 25px;
            }
            .book-card {
                background: var(--card-bg);
                border-radius: 10px;
                padding: 15px;
                text-align: center;
                box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
                cursor: pointer;
                transition:
                    transform 0.2s,
                    box-shadow 0.2s;
                position: relative;
                display: flex;
                flex-direction: column;
                justify-content: space-between;
            }
            .book-card:hover {
                transform: translateY(-5px);
                box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
            }
            .book-cover {
                width: 100%;
                height: 200px;
                object-fit: cover;
                border-radius: 6px;
                background-color: #eaeaea;
                margin-bottom: 10px;
            }
            .book-title {
                font-size: 14px;
                font-weight: 600;
                color: #333;
                margin: 8px 0 4px 0;
                display: -webkit-box;
                -webkit-line-clamp: 2;
                -webkit-box-orient: vertical;
                overflow: hidden;
            }
            .book-author {
                font-size: 12px;
                color: #777;
                margin: 0 0 10px 0;
            }
            .btn-delete {
                position: absolute;
                top: 5px;
                right: 5px;
                background: rgba(255, 0, 0, 0.7);
                color: white;
                border: none;
                border-radius: 50%;
                width: 24px;
                height: 24px;
                cursor: pointer;
                display: none;
            }
            .book-card:hover .btn-delete {
                display: block;
            }
            @media (max-width: 600px) {
                .lang-wrapper,
                .home-btn {
                    opacity: 0;
                    transform: translateY(-10px);
                    pointer-events: none;
                    transition: 0.3s ease;
                }
                .ui-visible .lang-wrapper,
                .ui-visible .home-btn {
                    opacity: 1;
                    transform: translateY(0);
                    pointer-events: auto;
                }
                body {
                    -webkit-tap-highlight-color: transparent;
                }
                header {
                    display: flex;
                    flex-wrap: wrap;
                    align-items: center;
                    gap: 12px;
                    margin-bottom: 30px;
                }

                header > h1,
                header > .upload-btn-wrapper {
                    margin: 0 auto;
                }

                header > div:last-child {
                    width: 100%;
                    display: flex;
                    gap: 10px;
                    align-items: center;
                    flex-wrap: wrap;
                }

                #search-input {
                    flex: 1;
                    min-width: 220px;
                }
            }
        </style>
        <script src="../../libs/epub/jszip.min.js"></script>
    </head>
    <body>
        <div class="container">
            <div class="lang-wrapper"></div>
            <a
                href="../../index.html"
                class="home-btn"
                onclick="sessionStorage.setItem('reloaded_once', '1')"
                style="
                    position: fixed;
                    top: 15px;
                    left: 15px;
                    padding: 10px 14px;
                    background: rgba(0, 0, 0, 0.6);
                    color: white;
                    text-decoration: none;
                    border-radius: 10px;
                    border: 1px solid rgba(255, 255, 255, 0.2);
                    backdrop-filter: blur(6px);
                    z-index: 11;
                "
            >
                ⬅ Home
            </a>
            <header>
                <h1 data-i18n="library.heading">Kệ Sách Của Tôi</h1>
                <div class="upload-btn-wrapper">
                    <button class="btn-upload" data-i18n="library.btn_add">
                        + Thêm sách EPUB mới
                    </button>
                    <input
                        type="file"
                        id="library-file-input"
                        accept=".epub"
                        multiple
                    />
                </div>
                <div
                    style="
                        display: flex;
                        gap: 10px;
                        flex-wrap: wrap;
                        align-items: center;
                    "
                >
                    <input
                        id="search-input"
                        type="text"
                        placeholder="Search title / author / genre..."
                        style="
                            padding: 8px 10px;
                            border-radius: 8px;
                            border: 1px solid #ddd;
                            min-width: 220px;
                        "
                    />

                    <select
                        id="sort-select"
                        style="padding: 8px; border-radius: 8px"
                    >
                        <option value="name">Name</option>
                        <option value="date">Date added</option>
                        <option value="recent">Recently Read</option>
                        <option value="size">Size</option>
                        <option value="author">Author</option>
                        <option value="genre">Genre</option>
                    </select>
                </div>
            </header>
            <h2>📚 Recently Read</h2>

            <div class="grid-library" id="recent-grid"></div>

            <h2>📖 My Library</h2>

            <div class="grid-library" id="library-grid"></div>
        </div>
        <script src="../../libs/i18n/i18n.js"></script>
        <script src="../../libs/i18n/lang.js"></script>
        <script src="library.js"></script>
        <script>
            let uiVisible = false;
            document.addEventListener("click", function (e) {
                if (window.innerWidth > 600) return;
                uiVisible = !uiVisible;
                if (uiVisible) {
                    document.body.classList.add("ui-visible");
                } else {
                    document.body.classList.remove("ui-visible");
                }
            });
        </script>
    </body>
</html>
