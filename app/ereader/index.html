<!doctype html>
<html lang="vi">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title data-i18n="library.page_title">Thư viện Sách ePub Cục Bộ</title>

        <link href="../../libs/i18n/language.css" rel="stylesheet" />
        <style>
            :root {
                --primary: #4a90e2;
                --bg: #f5f7fa;
                --card-bg: #ffffff;
            }
            body {
                font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
                background-color: var(--var-bg, #f5f7fa);
                margin: 0;
                padding: 20px;
            }
            .container {
                max-width: 1000px;
                margin: 0 auto;
            }
            header {
                display: flex;
                justify-content: space-between;
                align-items: center;
                margin-bottom: 30px;
            }
            h1 {
                color: #333;
                margin: 0;
            }
            .upload-btn-wrapper {
                position: relative;
                overflow: hidden;
                display: inline-block;
            }
            .btn-upload {
                border: 2px dashed var(--primary);
                color: var(--primary);
                background-color: white;
                padding: 10px 20px;
                border-radius: 8px;
                font-weight: bold;
                cursor: pointer;
            }
            .upload-btn-wrapper input[type="file"] {
                font-size: 100px;
                position: absolute;
                left: 0;
                top: 0;
                opacity: 0;
                cursor: pointer;
            }
            .grid-library {
                display: grid;
                grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
                gap: 25px;
            }
            .book-card {
                background: var(--card-bg);
                border-radius: 10px;
                padding: 15px;
                text-align: center;
                box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
                cursor: pointer;
                transition:
                    transform 0.2s,
                    box-shadow 0.2s;
                position: relative;
                display: flex;
                flex-direction: column;
                justify-content: space-between;
            }
            .book-card:hover {
                transform: translateY(-5px);
                box-shadow: 0 8px 25px rgba(0, 0, 0, 0.15);
            }
            .book-cover {
                width: 100%;
                height: 200px;
                object-fit: cover;
                border-radius: 6px;
                background-color: #eaeaea;
                margin-bottom: 10px;
            }
            .book-title {
                font-size: 14px;
                font-weight: 600;
                color: #333;
                margin: 8px 0 4px 0;
                display: -webkit-box;
                -webkit-line-clamp: 2;
                -webkit-box-orient: vertical;
                overflow: hidden;
            }
            .book-author {
                font-size: 12px;
                color: #777;
                margin: 0 0 10px 0;
            }
            .btn-delete {
                position: absolute;
                top: 5px;
                right: 5px;
                background: rgba(255, 0, 0, 0.7);
                color: white;
                border: none;
                border-radius: 50%;
                width: 24px;
                height: 24px;
                cursor: pointer;
                display: none;
            }
            .book-card:hover .btn-delete {
                display: block;
            }
            @media (max-width: 600px) {
                .lang-wrapper,
                .home-btn {
                    opacity: 0;
                    transform: translateY(-10px);
                    pointer-events: none;
                    transition: 0.3s ease;
                }
                .ui-visible .lang-wrapper,
                .ui-visible .home-btn {
                    opacity: 1;
                    transform: translateY(0);
                    pointer-events: auto;
                }
                body {
                    -webkit-tap-highlight-color: transparent;
                }
                header {
                    display: flex;
                    flex-wrap: wrap;
                    align-items: center;
                    gap: 12px;
                    margin-bottom: 30px;
                }

                header > h1,
                header > .upload-btn-wrapper {
                    margin: 0 auto;
                }

                header > div:last-child {
                    width: 100%;
                    display: flex;
                    gap: 10px;
                    align-items: center;
                    flex-wrap: wrap;
                }

                #search-input {
                    flex: 1;
                    min-width: 220px;
                }
            }
        </style>
        <script src="../../libs/epub/jszip.min.js"></script>
    </head>
    <body>
        <div class="container">
            <div class="lang-wrapper"></div>
            <a
                href="../../index.html"
                class="home-btn"
                onclick="sessionStorage.setItem('reloaded_once', '1')"
                style="
                    position: fixed;
                    top: 15px;
                    left: 15px;
                    padding: 10px 14px;
                    background: rgba(0, 0, 0, 0.6);
                    color: white;
                    text-decoration: none;
                    border-radius: 10px;
                    border: 1px solid rgba(255, 255, 255, 0.2);
                    backdrop-filter: blur(6px);
                    z-index: 11;
                "
            >
                ⬅ Home
            </a>
            <header>
                <h1 data-i18n="library.heading">Kệ Sách Của Tôi</h1>
                <div class="upload-btn-wrapper">
                    <button class="btn-upload" data-i18n="library.btn_add">
                        + Thêm sách EPUB mới
                    </button>
                    <input
                        type="file"
                        id="library-file-input"
                        accept=".epub"
                        multiple
                    />
                </div>
                <div
                    style="
                        display: flex;
                        gap: 10px;
                        flex-wrap: wrap;
                        align-items: center;
                    "
                >
                    <input
                        id="search-input"
                        type="text"
                        placeholder="Search title / author / genre..."
                        style="
                            padding: 8px 10px;
                            border-radius: 8px;
                            border: 1px solid #ddd;
                            min-width: 220px;
                        "
                    />

                    <select
                        id="sort-select"
                        style="padding: 8px; border-radius: 8px"
                    >
                        <option value="name">Name</option>
                        <option value="date">Date added</option>
                        <option value="recent">Recently Read</option>
                        <option value="size">Size</option>
                        <option value="author">Author</option>
                        <option value="genre">Genre</option>
                    </select>
                </div>
            </header>
            <h2>📚 Recently Read</h2>

            <div class="grid-library" id="recent-grid"></div>

            <h2>📖 My Library</h2>

            <div class="grid-library" id="library-grid"></div>
        </div>
        <script src="../../libs/i18n/i18n.js"></script>
        <script src="../../libs/i18n/lang.js"></script>
        <script>
            const DB_NAME = "EpubReaderLocalDB";
            const DB_VERSION = 2;
            const STORE_NAME = "bookshelf";
            const ASSET_STORE_NAME = "assets";
            let searchQuery = "";
            let sortMode = "name";
            function applyTranslations() {
                document.querySelectorAll("[data-i18n]").forEach((el) => {
                    const key = el.getAttribute("data-i18n");
                    if (typeof t === "function") {
                        el.innerText = t(key);
                    }
                });
            }
            function openDB() {
                return new Promise((resolve, reject) => {
                    const request = indexedDB.open(DB_NAME, DB_VERSION);
                    request.onerror = () => reject(request.error);
                    request.onsuccess = () => resolve(request.result);
                    request.onupgradeneeded = (e) => {
                        const db = e.target.result;
                        if (!db.objectStoreNames.contains(STORE_NAME)) {
                            db.createObjectStore(STORE_NAME, { keyPath: "id" });
                        }
                        if (!db.objectStoreNames.contains(ASSET_STORE_NAME)) {
                            db.createObjectStore(ASSET_STORE_NAME, {
                                keyPath: "path",
                            });
                        }
                    };
                });
            }
            async function renderRecentBooks() {
                const grid = document.getElementById("recent-grid");

                let books = await getAllBooksFromStorage();

                books = books
                    .filter((b) => b.lastReadAt)
                    .sort((a, b) => b.lastReadAt - a.lastReadAt)
                    .slice(0, 10);

                grid.innerHTML = "";

                if (books.length === 0) {
                    grid.innerHTML = "<p>Chưa có sách nào được đọc.</p>";
                    return;
                }

                books.forEach((book) => {
                    const card = document.createElement("div");
                    card.className = "book-card";
                    let coverSrc = `data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='100' height='140' viewBox='0 0 100 140'><rect width='100' height='140' fill='%23ccc'/><text x='50%' y='50%' dominant-baseline='middle' text-anchor='middle' font-family='sans-serif' font-size='12' fill='%23666'>${t("library.no_cover")}</text></svg>`;
                    if (book.coverBlob) {
                        coverSrc = URL.createObjectURL(book.coverBlob);
                    }
                    card.innerHTML = `                        <button class="btn-delete" onclick="event.stopPropagation(); askDeleteBook('${book.id}')">✕</button>                        <img class="book-cover" src="${coverSrc}" alt="Cover">                        <div class="book-title">${book.title}</div>                        <div class="book-author">${book.author}</div>                    `;
                    card.onclick = () => openBookInReader(book.id);
                    grid.appendChild(card);
                });
            }
            async function saveBookToStorage(bookData) {
                const db = await openDB();
                return new Promise((resolve, reject) => {
                    const transaction = db.transaction(STORE_NAME, "readwrite");
                    const store = transaction.objectStore(STORE_NAME);
                    const request = store.put(bookData);
                    request.onsuccess = () => resolve();
                    request.onerror = () => reject(request.error);
                });
            }
            async function updateLastRead(bookId) {
                const db = await openDB();

                return new Promise((resolve, reject) => {
                    const tx = db.transaction(STORE_NAME, "readwrite");
                    const store = tx.objectStore(STORE_NAME);

                    const req = store.get(bookId);

                    req.onsuccess = () => {
                        const book = req.result;
                        if (!book) return resolve();

                        book.lastReadAt = Date.now();

                        store.put(book);
                        resolve();
                    };

                    req.onerror = () => reject(req.error);
                });
            }
            async function saveAssetToStorage(assetData) {
                const db = await openDB();
                return new Promise((resolve, reject) => {
                    const transaction = db.transaction(
                        ASSET_STORE_NAME,
                        "readwrite",
                    );
                    const store = transaction.objectStore(ASSET_STORE_NAME);
                    const request = store.put(assetData);
                    request.onsuccess = () => resolve();
                    request.onerror = () => reject(request.error);
                });
            }
            function normalizeAssetPath(path) {
                return (path || "")
                    .replace(/\\/g, "/")
                    .replace(/^\/+/, "")
                    .replace(/\/+/g, "/");
            }
            function isImagePath(path) {
                return /\.(jpe?g|png|gif|svg|webp|bmp|avif|ico)$/i.test(path);
            }
            async function saveAssetsToStorage(zip, opfPath) {
                const basePath = opfPath.includes("/")
                    ? opfPath.substring(0, opfPath.lastIndexOf("/")) + "/"
                    : "";

                const entries = Object.keys(zip.files).filter(
                    (filePath) =>
                        !zip.files[filePath].dir && isImagePath(filePath),
                );

                for (const entryPath of entries) {
                    const file = zip.file(entryPath);
                    if (!file) continue;
                    const blob = await file.async("blob");
                    const normalizedPath = normalizeAssetPath(entryPath);
                    await saveAssetToStorage({
                        path: normalizedPath,
                        fileName: normalizedPath.split("/").pop(),
                        fullPath: normalizedPath,
                        mimeType: blob.type || "image/octet-stream",
                        blob,
                    });
                }
            }
            async function getAllBooksFromStorage() {
                const db = await openDB();
                return new Promise((resolve, reject) => {
                    const transaction = db.transaction(STORE_NAME, "readonly");
                    const store = transaction.objectStore(STORE_NAME);
                    const request = store.getAll();
                    request.onsuccess = () => resolve(request.result);
                    request.onerror = () => reject(request.error);
                });
            }
            async function deleteBookFromStorage(id) {
                const db = await openDB();
                return new Promise((resolve, reject) => {
                    const transaction = db.transaction(STORE_NAME, "readwrite");
                    const store = transaction.objectStore(STORE_NAME);
                    const request = store.delete(id);
                    request.onsuccess = () => resolve();
                    request.onerror = () => reject(request.error);
                });
            }
            document
                .getElementById("library-file-input")
                .addEventListener("change", handleImportEpub);
            async function handleImportEpub(e) {
                const files = e.target.files;
                if (!files || files.length === 0) return;

                const fileArray = Array.from(files);

                const importPromises = fileArray.map(async (file) => {
                    if (!file.name.endsWith(".epub")) return;

                    try {
                        const arrayBuffer = await file.arrayBuffer();
                        const zip = await JSZip.loadAsync(arrayBuffer);

                        const containerXmlStr = await zip
                            .file("META-INF/container.xml")
                            .async("string");
                        const parser = new DOMParser();
                        const containerDoc = parser.parseFromString(
                            containerXmlStr,
                            "text/xml",
                        );
                        const opfPath = containerDoc
                            .querySelector("rootfile")
                            .getAttribute("full-path");
                        const opfStr = await zip.file(opfPath).async("string");
                        const opfDoc = parser.parseFromString(
                            opfStr,
                            "text/xml",
                        );

                        const metadata = opfDoc.querySelector("metadata");

                        const title =
                            metadata?.querySelector("dc\\:title")
                                ?.textContent ||
                            metadata?.querySelector("title")?.textContent ||
                            file.name.replace(".epub", "");

                        const author =
                            metadata?.querySelector("dc\\:creator")
                                ?.textContent ||
                            metadata?.querySelector("creator")?.textContent ||
                            t("library.unknown_author");

                        const bookId =
                            crypto.randomUUID?.() ||
                            title + Date.now() + Math.random();

                        let coverHref = null;
                        const coverMeta =
                            opfDoc.querySelector('meta[name="cover"]');
                        if (coverMeta) {
                            const coverId = coverMeta.getAttribute("content");
                            coverHref = opfDoc
                                .querySelector(
                                    `manifest > item[id="${coverId}"]`,
                                )
                                ?.getAttribute("href");
                        }

                        let coverBlob = null;
                        if (coverHref) {
                            let basePath = opfPath.includes("/")
                                ? opfPath.substring(
                                      0,
                                      opfPath.lastIndexOf("/"),
                                  ) + "/"
                                : "";
                            let fullCoverPath = basePath + coverHref;
                            const coverFile =
                                zip.file(fullCoverPath) || zip.file(coverHref);
                            if (coverFile)
                                coverBlob = await coverFile.async("blob");
                        }

                        await saveAssetsToStorage(zip, opfPath);

                        const bookRecord = {
                            id: bookId,
                            title: title,
                            author: author,
                            fileBlob: file,
                            coverBlob: coverBlob,
                            addedAt: Date.now(),
                            size: file.size || 0,
                            genre: extractGenre(opfDoc),
                        };

                        await saveBookToStorage(bookRecord);
                    } catch (err) {
                        console.error(
                            `Lỗi khi import file ${file.name}: `,
                            err,
                        );
                    }
                });

                await Promise.all(importPromises);

                renderLibraryGrid();

                e.target.value = "";
            }
            function extractGenre(opfDoc) {
                const meta = opfDoc.querySelector("subject, dc\\:subject");
                return meta?.textContent?.trim() || "Unknown";
            }
            document
                .getElementById("search-input")
                .addEventListener("input", (e) => {
                    searchQuery = e.target.value.toLowerCase();
                    renderLibraryGrid();
                });

            document
                .getElementById("sort-select")
                .addEventListener("change", (e) => {
                    sortMode = e.target.value;
                    renderLibraryGrid();
                });
            function renderEmptyState() {
                const grid = document.getElementById("library-grid");
                grid.innerHTML = `                    <p style="grid-column: 1/-1; text-align:center; color:#999; padding: 40px 0;">                        ${t("library.empty_state")}                    </p>                `;
            }
            let renderToken = 0;
            async function renderLibraryGrid() {
                const token = ++renderToken;
                const grid = document.getElementById("library-grid");
                grid.innerHTML = "";
                let books = await getAllBooksFromStorage();
                if (searchQuery) {
                    books = books.filter((b) => {
                        return (
                            b.title?.toLowerCase().includes(searchQuery) ||
                            b.author?.toLowerCase().includes(searchQuery) ||
                            b.genre?.toLowerCase().includes(searchQuery)
                        );
                    });
                }
                if (token !== renderToken) return;
                if (books.length === 0) {
                    renderEmptyState();
                    return;
                }
                if (searchQuery) {
                    books = books.filter((b) => {
                        return (
                            b.title?.toLowerCase().includes(searchQuery) ||
                            b.author?.toLowerCase().includes(searchQuery) ||
                            b.genre?.toLowerCase().includes(searchQuery)
                        );
                    });
                }

                books.sort((a, b) => {
                    switch (sortMode) {
                        case "name":
                            return (a.title || "").localeCompare(b.title || "");

                        case "date":
                            return (b.addedAt || 0) - (a.addedAt || 0);

                        case "size":
                            return (b.size || 0) - (a.size || 0);

                        case "author":
                            return (a.author || "").localeCompare(
                                b.author || "",
                            );
                        case "recent":
                            return (b.lastReadAt || 0) - (a.lastReadAt || 0);
                        case "genre":
                            return (a.genre || "").localeCompare(b.genre || "");

                        default:
                            return 0;
                    }
                });
                if (books.length === 0) {
                    renderEmptyState();
                    return;
                }
                books.forEach((book) => {
                    const card = document.createElement("div");
                    card.className = "book-card";
                    let coverSrc = `data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='100' height='140' viewBox='0 0 100 140'><rect width='100' height='140' fill='%23ccc'/><text x='50%' y='50%' dominant-baseline='middle' text-anchor='middle' font-family='sans-serif' font-size='12' fill='%23666'>${t("library.no_cover")}</text></svg>`;
                    if (book.coverBlob) {
                        coverSrc = URL.createObjectURL(book.coverBlob);
                    }
                    card.innerHTML = `                        <button class="btn-delete" onclick="event.stopPropagation(); askDeleteBook('${book.id}')">✕</button>                        <img class="book-cover" src="${coverSrc}" alt="Cover">                        <div class="book-title">${book.title}</div>                        <div class="book-author">${book.author}</div>                    `;
                    card.onclick = () => openBookInReader(book.id);
                    grid.appendChild(card);
                });
            }
            async function askDeleteBook(id) {
                if (confirm(t("library.confirm_delete"))) {
                    await deleteBookFromStorage(id);
                    renderLibraryGrid();
                }
            }
            function openBookInReader(bookId) {
                updateLastRead(bookId);
                localStorage.setItem("selected_local_book_id", bookId);
                window.location.href = "ereader.html";
            }
            onI18nChange(() => {
                applyI18n();
                renderRecentBooks();
                renderLibraryGrid();
            });
            window.addEventListener("DOMContentLoaded", () => {
                applyI18n();
                renderRecentBooks();
                renderLibraryGrid();
            });
        </script>
        <script>
            let uiVisible = false;
            document.addEventListener("click", function (e) {
                if (window.innerWidth > 600) return;
                uiVisible = !uiVisible;
                if (uiVisible) {
                    document.body.classList.add("ui-visible");
                } else {
                    document.body.classList.remove("ui-visible");
                }
            });
        </script>
    </body>
</html>
