<!doctype html>
<html lang="vi">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title data-i18n="mdt.editor">Editor</title>
        <script src="jszip.min.js"></script>
        <style>
            body {
                --bg: #fafafa;
                --fg: #111;
                background-color: var(--bg);
                color: var(--fg);
                font-family: system-ui, sans-serif;
                max-width: 900px;
                margin: auto;
                padding: 24px;
                background: #fafafa;
                line-height: 1.8;
                transition:
                    background-color 0.25s ease,
                    color 0.25s ease;
            }

            .edit-btn {
                margin-left: 8px;
                padding: 3px 8px;
                font-size: 12px;
                cursor: pointer;
                border-radius: 6px;
                border: none;
                background: #888;
                color: #fff;
            }
            .edit-btn:hover {
                background: #555;
            }

            .edit-area {
                width: 100%;
                min-height: 120px;
                margin-top: 8px;
                padding: 8px;
                border-radius: 6px;
                border: 1px solid #ccc;
                font-family: inherit;
                font-size: 14px;
                line-height: 1.6;
            }

            .edit-controls {
                margin-top: 8px;
            }

            .edit-controls button {
                margin-right: 8px;
                padding: 4px 10px;
                border-radius: 6px;
                border: none;
                cursor: pointer;
            }

            .confirm-btn {
                background: #2e8b57;
                color: #fff;
            }
            .cancel-btn {
                background: #b22222;
                color: #fff;
            }

            .top-actions {
                text-align: center;
                margin-bottom: 12px;
            }

            .top-actions button {
                margin: 0 6px;
                padding: 6px 12px;
                border: none;
                border-radius: 8px;
                cursor: pointer;
                background: #333;
                color: #fff;
            }

            .top-actions button:hover {
                background: #000;
            }

            details {
                margin-bottom: 16px;
                border: 1px solid #ddd;
                border-radius: 6px;
                background: rgb(236, 231, 231);
                padding: 10px 14px;
            }
            summary {
                font-weight: bold;
                cursor: pointer;
                font-size: 1.1em;
                list-style: none;
            }
            summary::-webkit-details-marker {
                display: none;
            }
            summary::before {
                content: "▶ ";
            }
            details[open] > summary::before {
                content: "▼ ";
            }

            .content {
                white-space: pre-wrap;
                margin-top: 10px;
            }

            .bullet {
                display: block;
                text-align: center;
                font-size: 1.4em;
                margin: 2px 0;
            }
            .empty-text {
                display: block;
                text-align: center;
                opacity: 0.7;
                font-style: italic;
            }

            body.dark {
                background: #2e2e2e;
                color: #fff;
            }
            body.deep {
                background: #000;
                color: #fff;
            }
            body.anias {
                background: hsl(34, 44%, 69%);
                color: #000;
            }
            body.ruby {
                background: #112435;
                color: #fff;
            }
            body.navajo {
                background: #ba9c80;
                color: #000;
            }
            body.khaki {
                background: #d7d7af;
                color: #957c1d;
            }
            .lang-wrapper {
                position: fixed;
                top: 20px;
                right: 20px;

                display: flex;
                flex-direction: column;
                gap: 6px;

                padding: 10px 12px;
                border-radius: 12px;

                background: rgba(255, 255, 255, 0.05);
                backdrop-filter: blur(10px);
                border: 1px solid rgba(255, 255, 255, 0.1);

                color: white;
                font-family: system-ui, sans-serif;
            }

            .lang-label {
                font-size: 12px;
                opacity: 0.7;
            }

            .lang-select {
                background: rgba(0, 0, 0, 0.4);
                color: white;

                border: 1px solid rgba(255, 255, 255, 0.2);
                border-radius: 8px;

                padding: 6px 10px;

                outline: none;
                cursor: pointer;

                transition: 0.2s;
            }

            .lang-select:hover {
                border-color: rgba(0, 255, 255, 0.5);
                box-shadow: 0 0 10px rgba(0, 255, 255, 0.2);
            }

            .lang-select option {
                background: #111;
                color: white;
            }
            .fnr-match {
                background: rgba(255, 230, 0, 0.4);
                border-radius: 2px;
            }

            .fnr-active {
                background: rgba(255, 140, 0, 0.6);
            }
        </style>
    </head>

    <body>
        <a
            href="../index.html"
            style="
                position: fixed;
                top: 15px;
                left: 15px;
                padding: 10px 14px;
                background: rgba(0, 0, 0, 0.6);
                color: white;
                text-decoration: none;
                border-radius: 10px;
                border: 1px solid rgba(255, 255, 255, 0.2);
                backdrop-filter: blur(6px);
                z-index: 9999;
            "
        >
            ⬅ Home
        </a>
        <div class="lang-wrapper">
            <label class="lang-label" data-i18n="lang.option"></label>

            <select onchange="setLang(this.value)">
                <option value="vi-vn">🇻🇳 Tiếng Việt</option>
                <option value="en-us">🇺🇸 English</option>
                <option value="ja-jp">🇯🇵 日本語</option>
                <option value="ko-kr">🇰🇷 한국어</option>
                <option value="zh-cn">🇨🇳 简体中文</option>
                <option value="zh-tw">🇹🇼 繁體中文</option>
                <option value="th-th">🇹🇭 ไทย</option>
                <option value="id-id">🇮🇩 Indonesia</option>
                <option value="de-de">🇩🇪 Deutsch</option>
                <option value="fr-fr">🇫🇷 Français</option>
                <option value="es-es">🇪🇸 Español</option>
            </select>
        </div>
        <h1 style="text-align: center" data-i18n="subtitle.editor"></h1>

        <div id="modes" style="text-align: center; margin-bottom: 16px">
            <label data-i18n="appearance.opt"></label>
            <select id="themeSelect">
                <option value="" data-i18n="appearance.opt.default"></option>
                <option value="ruby" data-i18n="appearance.opt.ruby"></option>
                <option
                    value="navajo"
                    data-i18n="appearance.opt.navajo"
                ></option>
                <option value="khaki" data-i18n="appearance.khaki"></option>
                <option value="dark" data-i18n="appearance.opt.dark"></option>
                <option value="deep" data-i18n="appearance.opt.deep"></option>
                <option value="anias" data-i18n="appearance.opt.anias"></option>
            </select>
        </div>

        <h2 data-i18n="import.txt.notify"></h2>
        <div style="margin-bottom: 16px; text-align: center">
            <button
                id="createStoryBtn"
                style="
                    padding: 8px 16px;
                    border: none;
                    border-radius: 8px;
                    cursor: pointer;
                    background: #2e8b57;
                    color: #fff;
                    font-weight: bold;
                "
                data-i18n="new.novel"
            ></button>
            <button id="resetBtn" data-i18n="reset.novel"></button>
        </div>

        <input type="file" id="file" accept=".txt" />
        <input type="file" id="coverFile" accept="image/*" />
        <div id="app"></div>
        <div
            id="textModal"
            style="
                display: none;
                position: fixed;
                inset: 0;
                background: rgba(0, 0, 0, 0.5);
            "
        >
            <div
                style="
                    background: #fff;
                    width: 400px;
                    margin: 10% auto;
                    padding: 20px;
                "
            >
                <h3 id="modalTitle"></h3>

                <textarea
                    id="modalInput"
                    style="width: 100%; height: 150px"
                ></textarea>

                <div style="margin-top: 10px; text-align: right">
                    <button id="modalCancel">Cancel</button>
                    <button id="modalOk">OK</button>
                </div>
            </div>
        </div>
        <noscript>
            <div
                style="text-align: center; color: red; margin: 20px 0"
                data-i18n="noscript.tools"
            ></div>
        </noscript>
        <script>
            function uiT(key, fallback) {
                return typeof t === "function" ? t(key, fallback) : fallback;
            }
            document
                .getElementById("resetBtn")
                .addEventListener("click", () => {
                    STORY_DATA = {
                        title: "",
                        description: "",
                        characters: [],
                        chapters: [],
                    };
                    document.getElementById("app").innerHTML = "";
                    toggleCreateButton(true);
                });

            let ORIGINAL_TEXT = "";
            let STORY_DATA = {
                title: "",
                description: "",
                characters: [],
                chapters: [],
            };

            function buildSearchIndex() {
                SEARCH_INDEX = [];

                SEARCH_INDEX.push({
                    type: "title",
                    ref: STORY_DATA,
                    getText: () => STORY_DATA.title,
                });

                SEARCH_INDEX.push({
                    type: "description",
                    ref: STORY_DATA,
                    getText: () => STORY_DATA.description,
                });

                SEARCH_INDEX.push({
                    type: "characters",
                    ref: STORY_DATA,
                    getText: () => STORY_DATA.characters.join("\n"),
                });

                STORY_DATA.chapters.forEach((ch, i) => {
                    SEARCH_INDEX.push({
                        type: "chapter-title",
                        ref: ch,
                        index: i,
                        getText: () => ch.title,
                    });

                    SEARCH_INDEX.push({
                        type: "chapter-body",
                        ref: ch,
                        index: i,
                        getText: () => ch.body,
                    });
                });
            }

            function cleanBlankLines(str) {
                return str
                    .split(/\r?\n/)
                    .filter((line) => line.trim() !== "")
                    .join("\n");
            }

            function downloadFile(filename, text) {
                const blob = new Blob([text], { type: "text/plain" });
                const a = document.createElement("a");
                a.href = URL.createObjectURL(blob);
                a.download = filename;
                a.click();
            }

            function saveDetailsState() {
                return Array.from(document.querySelectorAll("details")).map(
                    (d) => d.open,
                );
            }

            function restoreDetailsState(state) {
                const details = document.querySelectorAll("details");
                details.forEach((d, i) => {
                    if (state[i]) d.open = true;
                });
            }
            async function getEPUBMetadata() {
                const author = await openTextModal(
                    uiT("epub.author", "Nhập tác giả:"),
                    "",
                );

                if (author === null) return null;

                const subjects = await openTextModal(
                    uiT("epub.subject", "Nhập thể loại (mỗi dòng 1 thể loại):"),
                    "",
                );

                if (subjects === null) return null;

                return {
                    author: author.trim(),
                    subjects: subjects
                        .split("\n")
                        .map((s) => s.trim())
                        .filter(Boolean),
                };
            }
            function openTextModal(title, defaultValue = "") {
                return new Promise((resolve) => {
                    const modal = document.getElementById("textModal");
                    const input = document.getElementById("modalInput");
                    const titleEl = document.getElementById("modalTitle");

                    titleEl.textContent = title;
                    input.value = defaultValue;

                    modal.style.display = "block";

                    document.getElementById("modalOk").onclick = () => {
                        modal.style.display = "none";
                        resolve(input.value);
                    };

                    document.getElementById("modalCancel").onclick = () => {
                        modal.style.display = "none";
                        resolve(null);
                    };
                });
            }
            function attachEditButton(
                container,
                getter,
                setter,
                flagIndex = null,
            ) {
                const btn = document.createElement("button");
                btn.textContent = uiT("ui.edit", "Edit");
                btn.className = "edit-btn";

                btn.onclick = (e) => {
                    if (e.target.classList.contains("alt-checkbox")) return;
                    if (container.querySelector(".edit-area")) return;

                    const original = getter();

                    const textarea = document.createElement("textarea");
                    textarea.className = "edit-area";
                    textarea.value = original;

                    const controls = document.createElement("div");
                    controls.className = "edit-controls";

                    const confirm = document.createElement("button");
                    confirm.textContent = uiT("ui.confirm", "Confirm");
                    confirm.className = "confirm-btn";

                    const cancel = document.createElement("button");
                    cancel.textContent = uiT("ui.cancel", "Cancel");
                    cancel.className = "cancel-btn";

                    confirm.onclick = () => {
                        const val = textarea.value;
                        setter(val);
                        if (flagIndex !== null) {
                            STORY_DATA.chapters[flagIndex].edited = true;
                        }
                        renderStory();
                    };

                    cancel.onclick = () => renderStory();

                    controls.appendChild(confirm);
                    controls.appendChild(cancel);

                    container.innerHTML = "";
                    container.appendChild(textarea);
                    container.appendChild(controls);
                };

                container.appendChild(btn);
            }
            function renumberChapters() {
                STORY_DATA.chapters.forEach((ch, i) => {
                    ch.title = ch.title.replace(/^\d+\.\s*/, "");

                    ch.title = i + 1 + "." + ch.title;
                });
            }

            function renderStory() {
                const oldState = saveDetailsState();
                const app = document.getElementById("app");
                app.innerHTML = "";

                const top = document.createElement("div");
                top.className = "top-actions";

                const epubBtn = document.createElement("button");
                epubBtn.textContent = t("export.epub");

                epubBtn.onclick = exportEPUB;

                top.appendChild(epubBtn);

                const fullBtn = document.createElement("button");
                fullBtn.textContent = t("download.all");

                fullBtn.onclick = () => {
                    let output = "";

                    output += "<>" + STORY_DATA.title + "</>\n";
                    output += "===========\n";
                    output +=
                        "<info>\n" +
                        cleanBlankLines(STORY_DATA.description) +
                        "\n</info>\n";
                    output += "===========\n";
                    output +=
                        "[\n" + STORY_DATA.characters.join("\n") + "\n]\n";
                    output += "===========\n";
                    output += "<list>\n";

                    STORY_DATA.chapters.forEach((ch) => {
                        output +=
                            ch.title +
                            "{\n" +
                            cleanBlankLines(ch.body) +
                            "\n}\n";
                    });

                    output += "</list>";
                    function fileName(name) {
                        return String(name)
                            .trim()
                            .replace(/[<>:"/\\|?*\x00-\x1F]/g, "")
                            .replace(/\s+/g, "_");
                    }
                    downloadFile(
                        fileName(STORY_DATA.title) + "_full.txt",
                        output,
                    );
                };

                const editedBtn = document.createElement("button");
                editedBtn.textContent = t("download.changed");

                editedBtn.onclick = () => {
                    let output = "";

                    output += "<>" + STORY_DATA.title + "</>\n";
                    output +=
                        "<info>\n" +
                        cleanBlankLines(STORY_DATA.description) +
                        "\n</info>\n";
                    output +=
                        "[\n" + STORY_DATA.characters.join("\n") + "\n]\n";
                    output += "<list>\n";

                    STORY_DATA.chapters.forEach((ch) => {
                        if (ch.edited) {
                            output +=
                                ch.title +
                                "{\n" +
                                cleanBlankLines(ch.body) +
                                "\n}\n";
                        }
                    });

                    output += "</list>";
                    function fileName(name) {
                        return String(name)
                            .trim()
                            .replace(/[<>:"/\\|?*\x00-\x1F]/g, "")
                            .replace(/\s+/g, "_");
                    }
                    downloadFile(
                        fileName(STORY_DATA.title) + "_edited.txt",
                        output,
                    );
                };

                top.appendChild(fullBtn);
                top.appendChild(editedBtn);
                app.appendChild(top);

                const titleEl = document.createElement("h1");
                titleEl.textContent = STORY_DATA.title;

                attachEditButton(
                    titleEl,
                    () => STORY_DATA.title,
                    (val) => (STORY_DATA.title = val),
                );

                app.appendChild(titleEl);

                const descDetails = document.createElement("details");
                const sum = document.createElement("summary");
                sum.textContent = uiT("ui.description", "Mô tả");

                const descDiv = document.createElement("div");
                descDiv.className = "content";
                descDiv.textContent = STORY_DATA.description;

                attachEditButton(
                    descDiv,
                    () => STORY_DATA.description,
                    (val) => (STORY_DATA.description = val),
                );

                descDetails.appendChild(sum);
                descDetails.appendChild(descDiv);
                app.appendChild(descDetails);

                const charDetails = document.createElement("details");
                const charSum = document.createElement("summary");
                charSum.textContent = uiT(
                    "ui.characters",
                    "Danh sách nhân vật",
                );

                const charDiv = document.createElement("div");
                charDiv.className = "content";
                charDiv.textContent = STORY_DATA.characters.join("\n");

                attachEditButton(
                    charDiv,
                    () => STORY_DATA.characters.join("\n"),
                    (val) => (STORY_DATA.characters = val.split("\n")),
                );

                charDetails.appendChild(charSum);
                charDetails.appendChild(charDiv);
                app.appendChild(charDetails);

                const listDetails = document.createElement("details");
                const listSum = document.createElement("summary");
                listSum.textContent = uiT("ui.chapters", "Danh sách chương");
                listDetails.appendChild(listSum);

                const addBtn = document.createElement("button");
                addBtn.textContent =
                    "➕ " + uiT("ui.add_chapter", "Thêm chương");
                addBtn.className = "edit-btn";
                addBtn.style.marginBottom = "10px";

                addBtn.onclick = () => {
                    STORY_DATA.chapters.push({
                        title: "Chương mới",
                        body: "",
                        edited: true,
                    });
                    renumberChapters();
                    renderStory();
                };
                listDetails.appendChild(addBtn);

                STORY_DATA.chapters.forEach((ch, index) => {
                    const chDetails = document.createElement("details");
                    const chSum = document.createElement("summary");
                    chSum.textContent = ch.title;

                    const controlSpan = document.createElement("span");
                    controlSpan.style.marginLeft = "10px";

                    const upBtn = document.createElement("button");
                    upBtn.textContent = "⬆";
                    upBtn.className = "edit-btn";
                    upBtn.onclick = (e) => {
                        e.stopPropagation();
                        if (index > 0) {
                            const temp = STORY_DATA.chapters[index];
                            STORY_DATA.chapters[index] =
                                STORY_DATA.chapters[index - 1];
                            STORY_DATA.chapters[index - 1] = temp;
                            renumberChapters();
                            renderStory();
                        }
                    };

                    const downBtn = document.createElement("button");
                    downBtn.textContent = "⬇";
                    downBtn.className = "edit-btn";
                    downBtn.onclick = (e) => {
                        e.stopPropagation();
                        if (index < STORY_DATA.chapters.length - 1) {
                            const temp = STORY_DATA.chapters[index];
                            STORY_DATA.chapters[index] =
                                STORY_DATA.chapters[index + 1];
                            STORY_DATA.chapters[index + 1] = temp;

                            renumberChapters();
                            renderStory();
                        }
                    };

                    const delBtn = document.createElement("button");
                    delBtn.textContent = "🗑";
                    delBtn.className = "edit-btn";
                    delBtn.onclick = (e) => {
                        e.stopPropagation();
                        if (
                            confirm(
                                uiT(
                                    "ui.confirm_delete_chapter",
                                    "Xoá chương này luôn hả?",
                                ),
                            )
                        ) {
                            STORY_DATA.chapters.splice(index, 1);
                            renumberChapters();
                            renderStory();
                        }
                    };

                    controlSpan.appendChild(upBtn);
                    controlSpan.appendChild(downBtn);
                    controlSpan.appendChild(delBtn);

                    chSum.appendChild(controlSpan);

                    attachEditButton(
                        chSum,
                        () => ch.title,
                        (val) => {
                            ch.title = val;
                            ch.edited = true;
                        },
                        index,
                    );

                    const chDiv = document.createElement("div");
                    chDiv.className = "content";

                    function renderChapterContent(div, content) {
                        div.innerHTML = "";

                        const lines = content.split(/\r?\n/);

                        const isEmpty = lines.every((line) => {
                            const t = line.trim();
                            return t === "" || t === "•";
                        });

                        if (isEmpty) {
                            div.classList.add("empty");

                            const bulletTop = document.createElement("span");
                            bulletTop.className = "bullet";
                            bulletTop.textContent = "•";

                            const emptyText = document.createElement("span");
                            emptyText.className = "empty-text";
                            emptyText.textContent = uiT(
                                "ui.not_updated",
                                "Chưa cập nhật",
                            );

                            const bulletBottom = document.createElement("span");
                            bulletBottom.className = "bullet";
                            bulletBottom.textContent = "•";

                            div.appendChild(bulletTop);
                            div.appendChild(emptyText);
                            div.appendChild(bulletBottom);
                        } else {
                            lines.forEach((line) => {
                                const trimmed = line.trim();

                                if (trimmed === "•") {
                                    const span = document.createElement("span");
                                    span.className = "bullet";
                                    span.textContent = "•";
                                    div.appendChild(span);
                                    return;
                                }

                                if (trimmed === "") {
                                    div.appendChild(
                                        document.createElement("br"),
                                    );
                                    div.appendChild(
                                        document.createElement("br"),
                                    );
                                    return;
                                }

                                const text = document.createTextNode(line);
                                div.appendChild(text);
                                div.appendChild(document.createElement("br"));
                                div.appendChild(document.createElement("br"));
                            });
                        }
                    }

                    renderChapterContent(chDiv, ch.body);

                    attachEditButton(
                        chDiv,
                        () => ch.body,
                        (val) => {
                            ch.body = val;
                            ch.edited = true;
                        },
                        index,
                    );

                    chDetails.appendChild(chSum);
                    chDetails.appendChild(chDiv);
                    listDetails.appendChild(chDetails);
                });

                app.appendChild(listDetails);
                restoreDetailsState(oldState);
                buildSearchIndex();
            }

            document.getElementById("file").addEventListener("change", (e) => {
                const file = e.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = () => {
                    ORIGINAL_TEXT = reader.result;
                    parseText(ORIGINAL_TEXT);
                    renderStory();
                    toggleCreateButton(false);
                };
                reader.readAsText(file, "utf-8");
            });

            function parseText(text) {
                const titleMatch = text.match(/<>\s*([\s\S]*?)\s*<\/>/);
                const descMatch = text.match(/<info>\s*([\s\S]*?)\s*<\/info>/);
                const charMatch = text.match(/\[\s*([\s\S]*?)\s*\]/);
                const listMatch = text.match(/<list>([\s\S]*?)<\/list>/);

                STORY_DATA.title = titleMatch ? titleMatch[1].trim() : "";
                STORY_DATA.description = descMatch
                    ? descMatch[1].trim()
                    : uiT("story.not_updated", "Chưa cập nhật");
                STORY_DATA.characters = charMatch
                    ? charMatch[1].trim().split("\n")
                    : [];
                STORY_DATA.chapters = [];

                if (listMatch) {
                    const content = listMatch[1];
                    const regex = /([^\n{]+)\{([\s\S]*?)\}/g;
                    let m;
                    while ((m = regex.exec(content)) !== null) {
                        STORY_DATA.chapters.push({
                            title: m[1].trim(),
                            body: m[2].trim(),
                            edited: false,
                        });
                    }
                }
                renumberChapters();
            }
            document
                .getElementById("createStoryBtn")
                .addEventListener("click", async () => {
                    const title = prompt(
                        uiT("prompt.title", "Nhập tiêu đề truyện:"),
                    );
                    if (!title) return;

                    const desc = await openTextModal(
                        uiT("prompt.description", "Nhập mô tả truyện:"),
                        "",
                    );

                    if (desc === null) return;

                    const charInput = await openTextModal(
                        uiT("prompt.characters", "Nhập danh sách nhân vật:"),
                        "",
                    );

                    if (charInput === null) return;

                    STORY_DATA = {
                        title: title.trim(),
                        description: desc.trim(),
                        characters: charInput
                            .split("\n")
                            .map((c) => c.trim())
                            .filter((c) => c !== ""),
                        chapters: [
                            {
                                title: "1.Chương mở đầu",
                                body: "•\nNội dung chương ở đây\n•",
                                edited: true,
                            },
                        ],
                    };

                    renderStory();
                    toggleCreateButton(false);
                });
            function toggleCreateButton(show) {
                const btn = document.getElementById("createStoryBtn");
                if (!btn) return;
                btn.style.display = show ? "inline-block" : "none";
            }
        </script>
        <script>
            const select = document.getElementById("themeSelect");
            const saved = localStorage.getItem("reader-theme");
            if (saved) {
                document.body.className = saved;
                select.value = saved;
            }
            select.addEventListener("change", () => {
                document.body.className = "";
                const theme = select.value;
                if (theme) {
                    document.body.classList.add(theme);
                    localStorage.setItem("reader-theme", theme);
                } else {
                    localStorage.removeItem("reader-theme");
                }
            });
        </script>
        <script src="../i18n-2.js"></script>
        <script src="find-replace.js"></script>
        <script src="epub.js"></script>
    </body>
</html>
